name: Build Docker Image and Deploy

on:
  push:
    branches:
      - main # 当推送到 main 分支时触发
  workflow_dispatch: # 允许手动触发

env:
  IMAGE_NAME: ai-service
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists
        run: |
          echo "🔍 验证镜像是否存在..."
          docker images | grep ${{ env.IMAGE_NAME }} || echo "⚠️  镜像未找到"
          if ! docker image inspect ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} > /dev/null 2>&1; then
            echo "❌ 错误: 镜像 ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} 不存在"
            exit 1
          fi
          echo "✅ 镜像验证成功"

      - name: Save and compress Docker image
        run: |
          echo "💾 正在保存 Docker 镜像..."
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | gzip > ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz

          if [ ! -f "${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz" ]; then
            echo "❌ 错误: 镜像文件保存失败"
            exit 1
          fi

          # 验证压缩后的文件大小
          GZ_SIZE=$(stat -f%z "${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz" 2>/dev/null || stat -c%s "${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz" 2>/dev/null || echo "0")
          if [ "$GZ_SIZE" -lt 100000 ]; then
            echo "❌ 错误: 压缩后的镜像文件过小 ($GZ_SIZE 字节)"
            exit 1
          fi

          echo "✅ 镜像已保存并压缩为 ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz"
          echo "📦 文件大小: $(du -h "${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz" | cut -f1) ($GZ_SIZE 字节)"
          ls -lh ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directory
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
        run: |
          DEPLOY_PATH="/opt/ai-service"
          echo "📁 确保服务器目录存在..."
          ssh ${SERVER_USERNAME}@${SERVER_HOST} "mkdir -p ${DEPLOY_PATH}/uploads && chmod 755 ${DEPLOY_PATH} && chmod 755 ${DEPLOY_PATH}/uploads" || {
            echo "❌ 错误: 无法创建服务器目录"
            exit 1
          }
          echo "✅ 服务器目录准备完成"

      - name: Upload Docker image to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
        run: |
          IMAGE_FILE="${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz"
          DEPLOY_PATH="/opt/ai-service"
          LOCAL_SIZE=$(stat -f%z "$IMAGE_FILE" 2>/dev/null || stat -c%s "$IMAGE_FILE" 2>/dev/null || echo "0")
          echo "📤 正在上传 Docker 镜像到服务器..."
          echo "📦 本地镜像文件大小: $(du -h "$IMAGE_FILE" | cut -f1)"
          scp "$IMAGE_FILE" ${SERVER_USERNAME}@${SERVER_HOST}:${DEPLOY_PATH}/

          # 验证文件是否成功上传
          echo "🔍 验证服务器上的镜像文件..."
          REMOTE_SIZE=$(ssh ${SERVER_USERNAME}@${SERVER_HOST} "stat -f%z ${DEPLOY_PATH}/$IMAGE_FILE 2>/dev/null || stat -c%s ${DEPLOY_PATH}/$IMAGE_FILE 2>/dev/null || echo '0'")
          if [ "$REMOTE_SIZE" != "$LOCAL_SIZE" ] || [ "$REMOTE_SIZE" = "0" ]; then
            echo "❌ 错误: 镜像文件上传不完整 (本地: $LOCAL_SIZE, 远程: $REMOTE_SIZE)"
            exit 1
          fi
          echo "✅ 镜像上传完成并验证通过"

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          # 环境变量配置（从 GitHub Secrets 读取）
          ENV_PORT: ${{ secrets.ENV_PORT }}
          ENV_NODE_ENV: ${{ secrets.ENV_NODE_ENV }}
          ENV_GLM_API_KEY: ${{ secrets.ENV_GLM_API_KEY }}
          ENV_TY_API_KEY: ${{ secrets.ENV_TY_API_KEY }}
          ENV_DB_HOST: ${{ secrets.ENV_DB_HOST }}
          ENV_DB_PORT: ${{ secrets.ENV_DB_PORT }}
          ENV_DB_USERNAME: ${{ secrets.ENV_DB_USERNAME }}
          ENV_DB_PASSWORD: ${{ secrets.ENV_DB_PASSWORD }}
          ENV_DB_NAME: ${{ secrets.ENV_DB_NAME }}
          ENV_APP_PRIVATE_KEY: ${{ secrets.ENV_APP_PRIVATE_KEY }}
          ENV_ALIPAY_PUBLIC_KEY: ${{ secrets.ENV_ALIPAY_PUBLIC_KEY }}
          ENV_FRONTEND_ORIGIN: ${{ secrets.ENV_FRONTEND_ORIGIN }}
          ENV_COS_SECRET_ID: ${{ secrets.ENV_COS_SECRET_ID }}
          ENV_COS_SECRET_KEY: ${{ secrets.ENV_COS_SECRET_KEY }}
          ENV_SESSION_SECRET: ${{ secrets.ENV_SESSION_SECRET }}
        run: |
          # 创建部署脚本
          cat > deploy.sh << 'DEPLOYSCRIPT'
          #!/bin/bash
          set -e

          DEPLOY_PATH="/opt/ai-service"
          IMAGE_NAME="$1"
          IMAGE_TAG="$2"
          IMAGE_FILE="$IMAGE_NAME-$IMAGE_TAG.tar.gz"

          cd "$DEPLOY_PATH"

          # 清理旧的失败镜像文件（小于 1MB 的文件）
          echo "🧹 清理旧的失败镜像文件..."
          find "$DEPLOY_PATH" -name "$IMAGE_NAME-*.tar.gz" -type f -size -1M -delete 2>/dev/null || true

          # 检查镜像文件是否存在
          if [ ! -f "$IMAGE_FILE" ]; then
            echo "❌ 错误: 镜像文件 $IMAGE_FILE 不存在"
            echo "📋 当前目录文件列表:"
            ls -lh "$DEPLOY_PATH" | grep "$IMAGE_NAME" || echo "未找到相关文件"
            exit 1
          fi

          # 检查文件大小（至少 1MB）
          FILE_SIZE=$(stat -f%z "$IMAGE_FILE" 2>/dev/null || stat -c%s "$IMAGE_FILE" 2>/dev/null || echo "0")
          FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))

          if [ "$FILE_SIZE" -eq 0 ]; then
            echo "❌ 错误: 镜像文件 $IMAGE_FILE 为空"
            exit 1
          fi

          if [ "$FILE_SIZE" -lt 1048576 ]; then
            echo "❌ 错误: 镜像文件 $IMAGE_FILE 过小 ($FILE_SIZE 字节, 约 $FILE_SIZE_MB MB)"
            echo "⚠️  正常的 Docker 镜像文件应该至少 1MB，当前文件可能损坏或不完整"
            exit 1
          fi

          echo "📦 镜像文件大小: $(du -h "$IMAGE_FILE" | cut -f1) ($FILE_SIZE 字节)"

          # 先解压，再加载（更可靠的方式）
          echo "📥 解压 Docker 镜像文件..."
          TEMP_TAR="${IMAGE_FILE%.gz}"

          # 解压文件
          if ! gunzip -c "$IMAGE_FILE" > "$TEMP_TAR"; then
            echo "❌ 错误: 解压镜像文件失败"
            echo "🔍 检查文件完整性..."
            file "$IMAGE_FILE" || true
            exit 1
          fi

          # 验证解压后的 tar 文件
          TAR_SIZE=$(stat -f%z "$TEMP_TAR" 2>/dev/null || stat -c%s "$TEMP_TAR" 2>/dev/null || echo "0")
          if [ "$TAR_SIZE" -lt 1048576 ]; then
            echo "❌ 错误: 解压后的 tar 文件过小 ($TAR_SIZE 字节)，可能解压失败"
            rm -f "$TEMP_TAR"
            exit 1
          fi
          echo "✅ 解压成功，tar 文件大小: $(du -h "$TEMP_TAR" | cut -f1)"

          # 验证 tar 文件格式
          if ! tar -tzf "$IMAGE_FILE" > /dev/null 2>&1 && ! file "$TEMP_TAR" | grep -q "tar archive"; then
            echo "⚠️  警告: tar 文件格式可能不正确，但继续尝试加载..."
          fi

          echo "📥 加载 Docker 镜像..."
          if ! docker load < "$TEMP_TAR"; then
            echo "❌ 错误: 加载 Docker 镜像失败"
            echo "🔍 调试信息:"
            echo "  - 临时文件: $TEMP_TAR"
            echo "  - 文件大小: $(du -h "$TEMP_TAR" | cut -f1)"
            echo "  - Docker 版本: $(docker --version)"
            echo "  - Docker 状态: $(systemctl is-active docker 2>/dev/null || echo 'unknown')"
            rm -f "$TEMP_TAR"
            exit 1
          fi

          # 清理临时文件
          rm -f "$TEMP_TAR"
          echo "✅ 镜像加载成功"

          # 验证镜像是否加载成功
          if ! docker image inspect "$IMAGE_NAME:$IMAGE_TAG" > /dev/null 2>&1; then
            echo "❌ 错误: 镜像 $IMAGE_NAME:$IMAGE_TAG 加载后验证失败"
            exit 1
          fi

          echo "🏷️  标记镜像为 latest..."
          docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:latest"

          echo "🛑 停止并删除旧容器..."
          docker stop ai-service 2>/dev/null || true
          docker rm ai-service 2>/dev/null || true

          echo "🚀 启动新容器..."
          docker run -d \
            --name ai-service \
            --restart unless-stopped \
            -p "${ENV_PORT:-3000}:3000" \
            -e NODE_ENV="${ENV_NODE_ENV:-production}" \
            -e PORT="${ENV_PORT:-3000}" \
            -e GLM_API_KEY="${ENV_GLM_API_KEY}" \
            -e TY_API_KEY="${ENV_TY_API_KEY}" \
            -e DB_HOST="${ENV_DB_HOST}" \
            -e DB_PORT="${ENV_DB_PORT}" \
            -e DB_USERNAME="${ENV_DB_USERNAME}" \
            -e DB_PASSWORD="${ENV_DB_PASSWORD}" \
            -e DB_NAME="${ENV_DB_NAME}" \
            -e APP_PRIVATE_KEY="${ENV_APP_PRIVATE_KEY}" \
            -e ALIPAY_PUBLIC_KEY="${ENV_ALIPAY_PUBLIC_KEY}" \
            -e FRONTEND_ORIGIN="${ENV_FRONTEND_ORIGIN}" \
            -e COS_SECRET_ID="${ENV_COS_SECRET_ID}" \
            -e COS_SECRET_KEY="${ENV_COS_SECRET_KEY}" \
            -e SESSION_SECRET="${ENV_SESSION_SECRET:-your-session-secret-key}" \
            -v "$DEPLOY_PATH/uploads:/app/uploads" \
            "$IMAGE_NAME:$IMAGE_TAG"

          echo "🧹 清理镜像文件..."
          rm -f "$IMAGE_FILE"

          echo "🧹 清理未使用的镜像..."
          docker image prune -f

          echo "✅ 部署完成！"
          DEPLOYSCRIPT

          chmod +x deploy.sh

          # 上传部署脚本到服务器
          DEPLOY_PATH="/opt/ai-service"
          scp deploy.sh ${SERVER_USERNAME}@${SERVER_HOST}:${DEPLOY_PATH}/

          # 在服务器上执行部署脚本，传递环境变量
          echo "🚀 正在服务器上执行部署..."
          ssh ${SERVER_USERNAME}@${SERVER_HOST} "ENV_PORT='${ENV_PORT}' ENV_NODE_ENV='${ENV_NODE_ENV}' ENV_GLM_API_KEY='${ENV_GLM_API_KEY}' ENV_TY_API_KEY='${ENV_TY_API_KEY}' ENV_DB_HOST='${ENV_DB_HOST}' ENV_DB_PORT='${ENV_DB_PORT}' ENV_DB_USERNAME='${ENV_DB_USERNAME}' ENV_DB_PASSWORD='${ENV_DB_PASSWORD}' ENV_DB_NAME='${ENV_DB_NAME}' ENV_APP_PRIVATE_KEY='${ENV_APP_PRIVATE_KEY}' ENV_ALIPAY_PUBLIC_KEY='${ENV_ALIPAY_PUBLIC_KEY}' ENV_FRONTEND_ORIGIN='${ENV_FRONTEND_ORIGIN}' ENV_COS_SECRET_ID='${ENV_COS_SECRET_ID}' ENV_COS_SECRET_KEY='${ENV_COS_SECRET_KEY}' ENV_SESSION_SECRET='${ENV_SESSION_SECRET}' bash ${DEPLOY_PATH}/deploy.sh ${IMAGE_NAME} ${IMAGE_TAG} && rm -f ${DEPLOY_PATH}/deploy.sh"

          # 清理本地文件
          rm -f deploy.sh
          rm -f ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz

          echo "✅ 部署成功完成！"
          echo "📦 镜像: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
