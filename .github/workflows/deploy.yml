name: Build and Upload

on:
  push:
    branches:
      - main # 当推送到 main 分支时触发
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 根据你的 Node.js 版本调整
          cache: 'pnpm' # 使用 pnpm 缓存

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Prepare deployment files
        run: |
          mkdir -p deploy
          # 将 dist 目录内的所有文件复制到 deploy 目录（不保留 dist 目录结构）
          cp -r dist/. deploy/ 2>/dev/null || true
          cp package.json deploy/
          cp pnpm-lock.yaml deploy/ 2>/dev/null || true
          # 如果需要 .env 文件，请确保在 GitHub Secrets 中配置并在服务器上创建

      - name: Create deployment archive
        run: |
          cd deploy
          tar -czf ../deploy.tar.gz .

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # 上传部署文件
          echo "正在上传部署文件到服务器..."
          scp deploy.tar.gz ${SERVER_USERNAME}@${SERVER_HOST}:${DEPLOY_PATH}/

          # 创建并上传部署脚本（删除所有文件并解压到当前目录）
          cat > deploy.sh << 'DEPLOYSCRIPT'
          #!/bin/bash
          set -e
          DEPLOY_PATH="$1"
          cd "$DEPLOY_PATH"

          # 删除当前目录下的所有文件（保留目录本身）
          echo "删除所有旧文件..."
          find . -mindepth 1 -maxdepth 1 ! -name 'deploy.tar.gz' ! -name 'deploy.sh' -exec rm -rf {} + 2>/dev/null || true

          # 解压新版本到当前目录
          echo "解压部署文件到当前目录..."
          tar -xzf deploy.tar.gz

          # 清理部署文件
          rm -f deploy.tar.gz

          echo "文件已上传并解压完成！"
          echo "请在服务器上手动重启应用。"
          DEPLOYSCRIPT

          chmod +x deploy.sh
          scp deploy.sh ${SERVER_USERNAME}@${SERVER_HOST}:${DEPLOY_PATH}/

          # 执行部署脚本（删除所有文件并解压到当前目录）
          echo "正在服务器上删除所有文件并解压新文件..."
          ssh ${SERVER_USERNAME}@${SERVER_HOST} "bash ${DEPLOY_PATH}/deploy.sh ${DEPLOY_PATH} && rm -f ${DEPLOY_PATH}/deploy.sh"

          echo "✅ 部署文件已成功上传到服务器！"
          echo "⚠️  请记得在服务器上手动重启应用。"

      - name: Cleanup
        if: always()
        run: |
          rm -rf deploy deploy.tar.gz
